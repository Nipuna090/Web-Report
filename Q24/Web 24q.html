<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Hover Overlay</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <img src="tree.jpg" alt="Tree" class="image">
        <div class="overlay">
            <h2>Card Title</h2>
            <p>This is a sample card description</p>
            <button class="btn">Read More</button>
        </div>
    </div>
</body>

</html>
